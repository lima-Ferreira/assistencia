<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js"></script>
    <script type="module" src="js/script.js" defer></script>

    <title>Sistema OS</title>
</head>

<body>

    <div class="layout">

        <main class="main">

            <header class="topbar">
                <h1>Nova Ordem de Serviço</h1>
            </header>

            <form id="form">

                <div class="card">
                    <h3>Cliente</h3>
                    <div class="grid">
                        <input name="nome_cliente" placeholder="Nome">
                        <input name="telefone" placeholder="Telefone">
                        <input name="venda" placeholder="Venda">

                        <input name="endereco_cliente" placeholder="Endereço">
                        <input name="bairro_cliente" placeholder="Bairro">
                        <input name="os" placeholder="OS">
                    </div>
                </div>

                <div class="card">
                    <h3>Produto</h3>

                    <div class="grid">
                        <input name="produto" class="full" placeholder="Produto">
                    </div>

                    <div class="linha-peca">
                        <input name="codigo" placeholder="Código">
                        <input name="peca" class="peca" placeholder="Peça">
                        <input name="cor" placeholder="Cor">
                        <input name="qde" placeholder="Qtd">

                        <button type="button" class="add">+ Adicionar</button>
                    </div>

                    <div class="table-box">
                        <table>
                            <thead>
                                <tr>
                                    <th>Código</th>
                                    <th>Peça</th>
                                    <th>Cor</th>
                                    <th>Qtd</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>

                <div class="card">
                    <h3>Finalização</h3>

                    <div class="grid">
                        <textarea name="obs" class="full" placeholder="Observações"></textarea>

                        <select name="lojas">
                            <option value="">Selecione a loja</option>
                            <option value="0">Matriz</option>
                            <option value="1">Palhano</option>
                            <option value="2">Jaguaruana</option>
                            <option value="3">Deposito</option>
                            <option value="4">Loja 05</option>
                            <option value="5">Limoeiro do Norte</option>
                            <option value="6">Itaiçaba</option>
                            <option value="7">Flores</option>
                            <option value="8">Aracati</option>
                        </select>

                        <input name="solicitante" placeholder="Solicitante">
                        <input name="assistencia" placeholder="Assistência">
                    </div>

                    <div class="buttons">
                        <button type="button" class="save">Salvar</button>
                        <button type="button" class="pdf">Gerar PDF</button>
                    </div>
                </div>

            </form>

        </main>
    </div>

</body>

</html>
